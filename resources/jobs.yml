# Supporting jobs — UC bootstrap, ML training, Lakebase sync, simulators.
#
# If you want individual jobs to run as the service principal instead of
# as the deploying user, add a per-job block like:
#
#   setup_unity_catalog:
#     run_as:
#       service_principal_name: ${var.service_principal}
#     ...
#
# You cannot set run_as at the target level while the bundle also ships
# an App — Apps must be owned by the deploying identity.

resources:
  jobs:

    setup_unity_catalog:
      name: livezerobus_setup_unity_catalog
      tasks:
        - task_key: run
          spark_python_task:
            python_file: ../scripts/setup_unity_catalog.py
          environment_key: py311
      environments:
        - environment_key: py311
          spec:
            client: "2"
            dependencies:
              - databricks-sdk>=0.45.0
      job_clusters: []

    train_supplier_model:
      name: livezerobus_train_supplier_model
      tasks:
        - task_key: train
          spark_python_task:
            python_file: ../ml/train_supplier_model.py
          environment_key: ml
      environments:
        - environment_key: ml
          spec:
            client: "2"
            dependencies:
              - scikit-learn>=1.5
              - mlflow>=2.16
              - pandas>=2.2
              - numpy>=1.26

    lakebase_sync:
      name: livezerobus_lakebase_sync
      tasks:
        - task_key: apply
          spark_python_task:
            python_file: ../lakebase_sync/apply.py
          environment_key: py311
      environments:
        - environment_key: py311
          spec:
            client: "2"
            dependencies:
              - databricks-sdk>=0.45.0
              - pyyaml>=6.0

    simulators_job:
      name: livezerobus_simulators
      tasks:
        - task_key: run_all
          spark_python_task:
            python_file: ../simulators/run_all.py
            parameters: ["--catalog", "${var.catalog}",
                         "--schema",  "${var.schema}",
                         "--rate", "25"]
          environment_key: sim
      environments:
        - environment_key: sim
          spec:
            client: "2"
            dependencies:
              - databricks-zerobus-sdk>=0.2.0
              - databricks-sdk>=0.45.0
              - numpy>=1.26
              - click>=8.1
