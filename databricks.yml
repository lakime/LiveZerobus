# Databricks Asset Bundle — LiveZerobus Auto Procurement demo
#
# Deploy everything with:
#   databricks bundle deploy -t dev
#
# Individual runnables:
#   databricks bundle run setup_unity_catalog -t dev
#   databricks bundle run train_supplier_model -t dev
#   databricks bundle run procurement_dlt      -t dev
#   databricks bundle run lakebase_sync        -t dev
#   databricks bundle run simulators_job       -t dev
#   databricks bundle run deploy_app           -t dev

bundle:
  name: livezerobus

variables:
  catalog:
    description: Unity Catalog catalog for all tables.
    default: main
  schema:
    description: Schema holding bronze/silver/gold tables.
    default: procurement
  warehouse_id:
    description: ID of the StandardSqlWarehouse.
    default: 97236bc440233966 
  app_name:
    description: Databricks Apps name.
    default: livezerobus
  lakebase_instance:
    description: Name of the Lakebase database instance.
    default: databricks_postgres
  lakebase_branch:
    description: Lakebase branch to sync into.
    default: production
  service_principal:
    description: Service principal running the app and jobs.
    default: app-3dxwqo
  model_name:
    description: Registered Unity Catalog model name.
    default: main.procurement.supplier_scoring_model

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-5347428297913551.11.azuredatabricks.net
    # NOTE: Databricks Apps must be owned by the deploying identity, so
    # `run_as` cannot be set at the target level when the bundle contains
    # an app. Jobs that should run as the service principal can set
    # `run_as` individually under resources.jobs.<name>.run_as — see the
    # commented examples in resources/jobs.yml.

  prod:
    mode: production
    workspace:
      host: https://adb-5347428297913551.11.azuredatabricks.net
      root_path: /Workspace/Shared/livezerobus
