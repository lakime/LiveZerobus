# Lakebase Synced Table definitions.
# Applied by lakebase_sync/apply.py via the Lakebase REST API.
#
# Each entry describes one Delta -> Postgres synced table.
# scheduling_policy:
#   CONTINUOUS    → low-latency change-data stream (requires CDC-capable
#                   source: streaming tables with change-data-feed enabled)
#   SNAPSHOT      → full refresh every N seconds (works for materialized
#                   views and batch tables — no CDC needed)
#   TRIGGERED     → on-demand only
#
# All five Gold tables below are Lakeflow MATERIALIZED VIEWS (batch
# aggregations / joins), so they do NOT expose CDC and CONTINUOUS mode
# would be rejected. Using SNAPSHOT on a short interval is the correct
# pattern here — the simulators drive enough churn upstream that a
# 30-60s snapshot feels near-real-time to the UI.
#
# Vertical-Farm Seed Procurement demo — only the Gold-layer tables are
# Delta-synced. The agent-state tables (email_inbox/outbox, po_drafts,
# budget_ledger, supplier_applications, invoice_reconciliations,
# agent_runs) are native Postgres tables in Lakebase — the FastAPI
# agents read/write them directly, so they do not sync from Delta.
# Their DDL lives in schemas/lakebase_schema.sql.

instance: ${lakebase_instance}        # e.g. databricks_postgres
target_branch: ${lakebase_branch}     # e.g. production
target_schema: liveoltp

tables:

  - source: ${catalog}.${schema}.gd_inventory_snapshot
    target: inventory_snapshot
    primary_keys: [sku, room_id]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30

  - source: ${catalog}.${schema}.gd_supplier_leaderboard
    target: supplier_leaderboard
    primary_keys: [sku, supplier_id]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30

  - source: ${catalog}.${schema}.gd_commodity_latest
    target: commodity_prices_latest
    primary_keys: [input_key]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30

  - source: ${catalog}.${schema}.gd_demand_1h
    target: demand_1h
    primary_keys: [sku, hour_ts]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 60

  - source: ${catalog}.${schema}.gd_procurement_recommendations
    target: procurement_recommendations
    primary_keys: [recommendation_id]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30

  - source: ${catalog}.${schema}.gd_sap_open_po_lines
    target: sap_po_lines
    primary_keys: [po_number, po_item]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30

  - source: ${catalog}.${schema}.gd_sap_invoice_matching
    target: sap_invoice_matching
    primary_keys: [invoice_doc_number]
    scheduling_policy: SNAPSHOT
    snapshot_interval_seconds: 30
