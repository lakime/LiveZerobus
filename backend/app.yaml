# Databricks Apps manifest.
#
# Layout at deploy time (source_code_path = ./backend):
#   /app/                       ← on the running container
#     app.yaml                  ← this file
#     requirements.txt          ← Python deps (installed automatically)
#     app/                      ← FastAPI package (matches `app.main:app`)
#       main.py
#       lakebase.py
#       routes/
#     static/                   ← compiled React bundle
#                                 (run scripts/build_frontend.sh before deploy)
#
# Env vars for Lakebase are set at deploy time with:
#   databricks apps update livezerobus \
#     --env PGHOST=<instance-host>.database.cloud.databricks.com \
#     --env PGUSER=<service-principal-uuid>
# The backend mints its own short-lived OAuth token for the Postgres password
# via the Databricks SDK — we only need host + user here.

command:
  - uvicorn
  - app.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: PGHOST
    value: ep-frosty-flower-e2o5hjfp.database.westeurope.azuredatabricks.net
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: databricks_postgres
  - name: PGUSER
    value: c4352007-a55b-4da5-b5c9-f4c8df89e58a
  - name: PG_SCHEMA
    value: liveoltp
  # Lakebase Autoscaling (Projects) resource parts. The app mints a
  # short-lived Postgres OAuth token via
  #   w.postgres.generate_database_credential(
  #       name="projects/{LAKEBASE_PROJECT}/branches/{LAKEBASE_BRANCH}"
  #            "/endpoints/{LAKEBASE_ENDPOINT}"
  #   )
  # Values come from `databricks postgres list-projects`,
  # `list-branches projects/<p>`, `list-endpoints projects/<p>/branches/<b>`.
  - name: LAKEBASE_PROJECT
    value: myzerobus
  - name: LAKEBASE_BRANCH
    value: production
  - name: LAKEBASE_ENDPOINT
    value: primary
  - name: FRONTEND_DIST
    value: static
  - name: FM_MODEL
    value: databricks-meta-llama-3-3-70b-instruct
  - name: BUDGET_MONTHLY_USD
    value: "25000"
